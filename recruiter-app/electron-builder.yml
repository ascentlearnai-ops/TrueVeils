appId: com.truveil.recruiter
productName: Truveil
protocols:
  - name: Truveil Recruiter
    schemes:
      - truveil-recruiter
directories:
  output: dist
compression: maximum
files:
  - main.js
  - preload.js
  - package.json
  - assets/**/*
  - src/config/runtime-config.json
  - src/**/*
  - "!node_modules/**/*.map"
  - "!node_modules/**/*.d.ts"
  - "!node_modules/**/*.md"
  - "!node_modules/**/LICENSE*"
  - "!node_modules/**/CHANGELOG*"
  - "!node_modules/**/docs/**/*"
  - "!node_modules/**/example*"
  - "!node_modules/**/examples/**/*"
  - "!node_modules/**/test/**/*"
  - "!node_modules/**/tests/**/*"
asarUnpack:
  - node_modules/ffmpeg-static/ffmpeg.exe
mac:
  category: public.app-category.business
  target:
    - dmg
win:
  icon: assets/truveil.ico
  target:
    - nsis
  artifactName: TruveilRecruiter-Setup-${version}.${ext}
  requestedExecutionLevel: asInvoker
  signAndEditExecutable: false
nsis:
  oneClick: true
  perMachine: false
  runAfterFinish: true
