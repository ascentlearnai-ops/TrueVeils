appId: com.truveil.recruiter
productName: Truveil
directories:
  output: dist
files:
  - main.js
  - preload.js
  - package.json
  - src/config/runtime-config.json
  - src/**/*
asarUnpack:
  - node_modules/ffmpeg-static/ffmpeg.exe
mac:
  category: public.app-category.business
  target:
    - dmg
win:
  target:
    - nsis
  artifactName: TruveilRecruiter-Setup-${version}.${ext}
  requestedExecutionLevel: asInvoker
  signAndEditExecutable: false
nsis:
  oneClick: true
  perMachine: false
  runAfterFinish: true
