appId: com.truveil.secure
productName: TruveilSecure
directories:
  output: dist
files:
  - main.js
  - preload.js
  - package.json
  - src/config/runtime-config.json
  - src/renderer/**/*
mac:
  category: public.app-category.business
  target:
    - dmg
win:
  target:
    - nsis
  artifactName: TruveilSecure-Setup-${version}.${ext}
  requestedExecutionLevel: asInvoker
  signAndEditExecutable: false
nsis:
  oneClick: true
  perMachine: false
  runAfterFinish: true
